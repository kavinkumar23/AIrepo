<!DOCTYPE html>
<html>
  <head>
    <title>AI Summarizer</title>
    <style>
      body {
        width: 520px;      /* 👈 increased width */
        height: 260px;     /* 👈 compact height */
        margin: 0;
        padding: 10px;
        font-family: Arial;
        overflow: hidden;
        background: #f8fafc;
      }
      #container {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      button {
        width: 100%;
        padding: 10px;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
      }

      button:hover {
        background: #1d4ed8;
      }

      #output {
        margin-top: 10px;
        max-height: 180px;   /* 👈 scroll inside */
        overflow-y: auto;
        padding: 10px;
        background: #0f172a;
        color: white;
        border-radius: 10px;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <button id="summarize">Summarize Page</button>
      <div id="output">Click to generate summary</div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
